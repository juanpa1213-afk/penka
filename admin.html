<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Admin — Penka Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --fondo:#0a1628;--fondo2:#0f1e3c;--fondo3:#162040;
    --borde:#1e3060;--texto:#e8edf5;--texto2:#8a9bbf;
    --dorado:#f0b429;--dorado-claro:#f7d070;
    --verde-oscuro:#0d3b1e;--verde-claro:#25a366;
    --rojo:#e53e3e;--azul:#2d6be4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--fondo);color:var(--texto);font-family:'Inter',sans-serif;min-height:100vh;}

  /* LOGIN ADMIN */
  #login-section{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .login-box{background:var(--fondo2);border:1px solid var(--borde);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;}
  .login-logo{text-align:center;font-size:2.5rem;margin-bottom:8px;}
  .login-title{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:700;color:var(--dorado);margin-bottom:4px;}
  .login-sub{text-align:center;font-size:.82rem;color:var(--texto2);margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.78rem;color:var(--texto2);margin-bottom:5px;font-weight:500;}
  .field input{width:100%;background:var(--fondo3);border:1px solid var(--borde);border-radius:8px;color:var(--texto);padding:10px 12px;font-size:.95rem;outline:none;}
  .field input:focus{border-color:var(--dorado);}
  .btn-primary{width:100%;background:var(--dorado);color:#000;font-weight:700;border:none;border-radius:8px;padding:12px;font-size:1rem;cursor:pointer;margin-top:4px;}
  .btn-primary:hover{background:var(--dorado-claro);}
  .error-box{background:#2d1010;border:1px solid var(--rojo);color:#fc8181;border-radius:8px;padding:10px 12px;font-size:.83rem;margin-bottom:12px;display:none;}

  /* APP */
  #app-section{display:none;}
  .topbar{background:var(--fondo2);border-bottom:1px solid var(--borde);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;color:var(--dorado);}
  .btn-logout{background:none;border:1px solid var(--borde);color:var(--texto2);border-radius:6px;padding:6px 12px;font-size:.8rem;cursor:pointer;}
  .btn-logout:hover{border-color:var(--rojo);color:var(--rojo);}

  .content{padding:16px;max-width:700px;margin:0 auto;}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--dorado-claro);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
  .stat-pill{background:var(--fondo2);border:1px solid var(--borde);border-radius:10px;padding:10px;text-align:center;}
  .stat-pill .n{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:700;color:var(--dorado);}
  .stat-pill .l{font-size:.7rem;color:var(--texto2);}

  /* GRUPOS */
  .grupo-block{margin-bottom:16px;}
  .grupo-label{font-size:.78rem;font-weight:700;color:var(--texto2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;padding:0 2px;}
  .partido-admin{background:var(--fondo2);border:1px solid var(--borde);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .pa-teams{flex:1;display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;min-width:0;}
  .pa-flag{font-size:1.1rem;}
  .pa-vs{color:var(--texto2);font-size:.75rem;flex-shrink:0;}
  .pa-score{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .score-in{width:38px;height:38px;text-align:center;background:var(--fondo3);border:1px solid var(--borde);border-radius:8px;color:var(--texto);font-size:1rem;font-weight:700;outline:none;}
  .score-in:focus{border-color:var(--dorado);}
  .score-in.done{border-color:var(--verde-claro);background:rgba(37,163,102,.1);}
  .sep{color:var(--texto2);font-weight:700;}
  .btn-save-partido{background:var(--dorado);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap;}
  .btn-save-partido:hover{background:var(--dorado-claro);}
  .btn-save-partido.saved{background:var(--verde-claro);color:#fff;}
  .pts-badge{font-size:.72rem;color:var(--verde-claro);font-weight:600;display:none;}

  /* TOAST */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a3a1a;border:1px solid var(--verde-claro);color:var(--verde-claro);border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:600;z-index:999;display:none;white-space:nowrap;}

  /* LOADING */
  #loading-overlay{position:fixed;inset:0;background:rgba(10,22,40,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-size:1rem;color:var(--texto);gap:12px;}
  #loading-overlay .spin{font-size:2.5rem;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-box">
    <div class="login-logo">⚙️</div>
    <div class="login-title">Panel Admin</div>
    <div class="login-sub">Penka Mundial 2026</div>
    <div class="error-box" id="error-box"></div>
    <div class="field"><label>Contraseña admin</label><input type="password" id="admin-pass" placeholder="••••••" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="btn-primary" onclick="adminLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-section">
  <div class="topbar">
    <div class="topbar-title">⚙️ Admin — Penka 2026</div>
    <button class="btn-logout" onclick="adminLogout()">Salir</button>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-pill"><div class="n" id="st-users">0</div><div class="l">Jugadores</div></div>
      <div class="stat-pill"><div class="n" id="st-jugados">0</div><div class="l">Jugados</div></div>
      <div class="stat-pill"><div class="n" id="st-pendientes">72</div><div class="l">Pendientes</div></div>
    </div>

    <div class="section-title">⚽ Resultados de grupos</div>
    <div id="grupos-admin"></div>
  </div>
</div>

<div id="toast"></div>
<div id="loading-overlay" style="display:none"><div class="spin">⚙️</div><div id="loading-msg">Cargando...</div></div>

<script>
// == CONFIG ==
const ADMIN_PASS = 'admin2026'; // cambia esto
const JBKEY = '$2a$10$leh0QIWHdFKfO/isXO5vdOWy4sQfd1nHKkFJfvJEZLu7Y7tj.iGOC';
const JBURL = 'https://api.jsonbin.io/v3/b';

const GRUPOS_REAL = {
  A:{equipos:[["🇲🇽","México"],["🇺🇸","EE.UU."],["🇨🇦","Canadá"],["🇩🇿","Argelia"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  B:{equipos:[["🇦🇷","Argentina"],["🇲🇦","Marruecos"],["🇺🇾","Uruguay"],["🇪🇨","Ecuador"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  C:{equipos:[["🇧🇷","Brasil"],["🇯🇵","Japón"],["🏴󠁧󠁢󠁥󠁮󠁧󠁿","Inglaterra"],["🇸🇦","Arabia S."]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  D:{equipos:[["🇫🇷","Francia"],["🇳🇱","P.Bajos"],["🇧🇪","Bélgica"],["🇦🇿","Azerbaiyán"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  E:{equipos:[["🇩🇪","Alemania"],["🇵🇹","Portugal"],["🇪🇸","España"],["🇿🇼","Zimbabwe"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  F:{equipos:[["🇭🇷","Croacia"],["🇸🇳","Senegal"],["🇦🇺","Australia"],["🇰🇪","Kenia"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  G:{equipos:[["🇹🇷","Turquía"],["🇵🇱","Polonia"],["🇺🇦","Ucrania"],["🇨🇱","Chile"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  H:{equipos:[["🇰🇷","Corea Sur"],["🇷🇸","Serbia"],["🇨🇴","Colombia"],["🇬🇭","Ghana"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  I:{equipos:[["🇮🇷","Irán"],["🇯🇴","Jordania"],["🇵🇭","Filipinas"],["🇳🇿","N.Zelanda"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  J:{equipos:[["🇨🇲","Camerún"],["🇧🇴","Bolivia"],["🇳🇬","Nigeria"],["🇿🇦","Sudáfrica"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  K:{equipos:[["🇮🇹","Italia"],["🇸🇪","Suecia"],["🇨🇭","Suiza"],["🇵🇦","Panamá"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
  L:{equipos:[["🇩🇰","Dinamarca"],["🇸🇰","Eslovaquia"],["🇷🇴","Rumania"],["🇬🇷","Grecia"]],partidos:[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]},
};

// == DB ==
let BIN_ID = null;
let _db = null;

function setLoading(on, msg){
  const el = document.getElementById('loading-overlay');
  el.style.display = on ? 'flex' : 'none';
  if(msg) document.getElementById('loading-msg').textContent = msg;
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 2500);
}

function showError(msg){
  const e = document.getElementById('error-box');
  e.textContent = msg; e.style.display = 'block';
  setTimeout(()=>e.style.display='none', 3500);
}

async function dbLoad(){
  setLoading(true,'Conectando...');
  try {
    BIN_ID = localStorage.getItem('pm26_bin');
    if(BIN_ID){
      const r = await fetch(JBURL+'/'+BIN_ID+'/latest',{headers:{'X-Master-Key':JBKEY}});
      if(r.ok){ const j=await r.json(); _db=j.record; setLoading(false); return true; }
    }
    setLoading(false);
    showError('No se encontró la base de datos. Abre primero la app principal.');
    return false;
  } catch(e){ setLoading(false); showError('Error de conexión'); return false; }
}

async function dbSave(){
  if(!BIN_ID) return;
  await fetch(JBURL+'/'+BIN_ID,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JBKEY},
    body:JSON.stringify(_db)
  });
}

// == PUNTOS ==
function calcPuntos(real_l, real_v, pred_l, pred_v){
  const rl=parseInt(real_l), rv=parseInt(real_v), pl=parseInt(pred_l), pv=parseInt(pred_v);
  if(isNaN(rl)||isNaN(rv)||isNaN(pl)||isNaN(pv)) return 0;
  let pts = 0;
  // Resultado correcto (ganador o empate)
  const resReal = rl>rv?'L':rl<rv?'V':'E';
  const resPred = pl>pv?'L':pl<pv?'V':'E';
  if(resReal !== resPred) return 0; // no acertó ni el ganador
  pts += 10; // base por acertar ganador/empate
  // Marcador exacto +5
  if(pl===rl && pv===rv){ pts+=5; return pts; }
  // Goles del ganador exactos +3
  if(resReal==='L'&&pl===rl) pts+=3;
  else if(resReal==='V'&&pv===rv) pts+=3;
  // Diferencia de goles exacta +2
  if((rl-rv)===(pl-pv)) pts+=2;
  // Goles del perdedor exactos +1
  if(resReal==='L'&&pv===rv) pts+=1;
  else if(resReal==='V'&&pl===rl) pts+=1;
  // Goleada +1
  if(Math.abs(rl-rv)>=4) pts+=1;
  return pts;
}

async function guardarResultado(grupo, pi, btnEl){
  const lEl = document.getElementById(`rl-${grupo}-${pi}`);
  const vEl = document.getElementById(`rv-${grupo}-${pi}`);
  const rl = lEl.value.trim();
  const rv = vEl.value.trim();
  if(rl===''||rv==='') return showError('Ingresa ambos goles');

  btnEl.textContent='⏳'; btnEl.disabled=true;

  // Guardar resultado real
  if(!_db.resultados) _db.resultados={};
  if(!_db.resultados[grupo]) _db.resultados[grupo]={};
  _db.resultados[grupo][pi]={local:rl, visitante:rv};

  // Recalcular puntos de todos los usuarios para este partido
  const users = _db.users||{};
  for(const u of Object.keys(users)){
    const ud = (_db.data&&_db.data[u])||{grupos:{},bracket:{},campeon:''};
    const pred = (ud.grupos&&ud.grupos[grupo]&&ud.grupos[grupo][pi]);
    if(!ud.puntos) ud.puntos={};
    if(!ud.puntos[grupo]) ud.puntos[grupo]={};
    if(pred && pred.local!=='' && pred.visitante!==''){
      ud.puntos[grupo][pi] = calcPuntos(rl, rv, pred.local, pred.visitante);
    } else {
      ud.puntos[grupo][pi] = 0;
    }
    if(!_db.data) _db.data={};
    _db.data[u] = ud;
  }

  await dbSave();
  btnEl.textContent='✅'; btnEl.className='btn-save-partido saved'; btnEl.disabled=false;
  lEl.classList.add('done'); vEl.classList.add('done');
  toast(`✅ Resultado guardado y puntos calculados`);
  updateStats();
}

// == ADMIN LOGIN ==
function adminLogin(){
  const pass = document.getElementById('admin-pass').value;
  if(pass !== ADMIN_PASS) return showError('Contraseña incorrecta');
  sessionStorage.setItem('admin_ok','1');
  initAdmin();
}

function adminLogout(){
  sessionStorage.removeItem('admin_ok');
  document.getElementById('login-section').style.display='flex';
  document.getElementById('app-section').style.display='none';
}

// == RENDER ==
function updateStats(){
  const users = Object.keys(_db.users||{}).length;
  document.getElementById('st-users').textContent = users;
  const res = _db.resultados||{};
  let jugados=0;
  Object.values(res).forEach(g=>jugados+=Object.keys(g).length);
  document.getElementById('st-jugados').textContent = jugados;
  document.getElementById('st-pendientes').textContent = 72-jugados;
}

function renderAdmin(){
  const res = _db.resultados||{};
  const container = document.getElementById('grupos-admin');
  container.innerHTML='';

  Object.entries(GRUPOS_REAL).forEach(([letra, grupo])=>{
    const block = document.createElement('div');
    block.className='grupo-block';
    const rows = grupo.partidos.map((par,pi)=>{
      const [ai,bi]=par;
      const [fA,nA]=grupo.equipos[ai];
      const [fB,nB]=grupo.equipos[bi];
      const saved=(res[letra]&&res[letra][pi])||{local:'',visitante:''};
      const isDone=saved.local!==''&&saved.visitante!=='';
      return`<div class="partido-admin">
        <div class="pa-teams">
          <span class="pa-flag">${fA}</span><span style="font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55px">${nA}</span>
          <span class="pa-vs">vs</span>
          <span class="pa-flag">${fB}</span><span style="font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55px">${nB}</span>
        </div>
        <div class="pa-score">
          <input class="score-in ${isDone?'done':''}" id="rl-${letra}-${pi}" type="number" min="0" max="20" value="${saved.local}" placeholder="0">
          <span class="sep">:</span>
          <input class="score-in ${isDone?'done':''}" id="rv-${letra}-${pi}" type="number" min="0" max="20" value="${saved.visitante}" placeholder="0">
        </div>
        <button class="btn-save-partido ${isDone?'saved':''}" id="btn-${letra}-${pi}"
          onclick="guardarResultado('${letra}',${pi},this)">
          ${isDone?'✅':'Guardar'}
        </button>
      </div>`;
    }).join('');
    block.innerHTML=`<div class="grupo-label">Grupo ${letra}</div>${rows}`;
    container.appendChild(block);
  });
  updateStats();
}

async function initAdmin(){
  const ok = await dbLoad();
  if(!ok) return;
  document.getElementById('login-section').style.display='none';
  document.getElementById('app-section').style.display='block';
  renderAdmin();
}

// == INIT ==
if(sessionStorage.getItem('admin_ok')==='1') initAdmin();
</script>
</body>
</html>
